spring:
  application:
    name: preswatch-backend

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/preswatch}
    username: ${SPRING_DATASOURCE_USERNAME:preswatch}
    password: ${SPRING_DATASOURCE_PASSWORD:preswatch}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    schemas: public

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:7200000}

app:
  refresh-token:
    expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS:30}
  cookie:
    secure: ${APP_COOKIE_SECURE:false}
    same-site: ${APP_COOKIE_SAME_SITE:Strict}
  scheduler:
    timezone: ${APP_SCHEDULER_TIMEZONE:America/Argentina/Buenos_Aires}
  mail:
    from: ${MAIL_FROM:noreply@preswatch.app}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  password-reset:
    expiration-minutes: 60

server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false
